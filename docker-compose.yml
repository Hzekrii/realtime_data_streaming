services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - confluent

  broker:
    image: confluentinc/cp-server:7.4.0
    hostname: broker
    container_name: broker
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      CONFLUENT_METRICS_ENABLE: "false"
      CONFLUENT_SUPPORT_CUSTOMER_ID: "anonymous"
      # ✅ FIX 1: Disable Confluent telemetry completely
      KAFKA_CONFLUENT_TELEMETRY_ENABLED: "false"
      KAFKA_METRIC_REPORTERS: ""
      KAFKA_CONFLUENT_SCHEMA_REGISTRY_URL: ""
      KAFKA_JMX_OPTS: "-Dcom.sun.management.jmxremote \
        -Dcom.sun.management.jmxremote.authenticate=false \
        -Dcom.sun.management.jmxremote.ssl=false \
        -Dcom.sun.management.jmxremote.rmi.port=9101"
    # ✅ FIX 2: Use reliable TCP port check instead of kafka-topics
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9092' 2>/dev/null && echo 'Broker Ready' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - confluent

  schema-registry:
    image: confluentinc/cp-schema-registry:7.4.0
    hostname: schema-registry
    container_name: schema-registry
    depends_on:
      - broker
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: broker:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - confluent

  control-center:
    image: confluentinc/cp-enterprise-control-center:7.4.0
    hostname: control-center
    container_name: control-center
    depends_on:
      - broker
      - schema-registry
    ports:
      - "9021:9021"
    environment:
      CONTROL_CENTER_BOOTSTRAP_SERVERS: broker:29092
      CONTROL_CENTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONTROL_CENTER_REPLICATION_FACTOR: 1
      CONTROL_CENTER_INTERNAL_TOPICS_PARTITIONS: 1
      CONFLUENT_METRICS_ENABLE: "false"
      PORT: 9021
    networks:
      - confluent

  webserver:
    image: apache/airflow:2.6.0-python3.9
    depends_on:
      - postgres
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: this_is_a_very_secured_key
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./requirements.txt:/opt/airflow/requirements.txt
      - ./script/entrypoint.sh:/opt/airflow/script/entrypoint.sh
    ports:
      - "8080:8080"
    # ✅ Single line user create command - fixes formatting issue
    command: bash -c "pip install --no-cache-dir -r /opt/airflow/requirements.txt && airflow db init && airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin 2>/dev/null || true && airflow webserver"
    networks:
      - confluent

  scheduler:
    image: apache/airflow:2.6.0-python3.9
    depends_on:
      - webserver
    volumes:
      - ./dags:/opt/airflow/dags
      - ./requirements.txt:/opt/airflow/requirements.txt
      - ./script/entrypoint.sh:/opt/airflow/script/entrypoint.sh
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: this_is_a_very_secured_key
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    command: bash -c "pip install --no-cache-dir -r /opt/airflow/requirements.txt && airflow db init && airflow scheduler"
    networks:
      - confluent

  postgres:
    image: postgres:14.0
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - confluent

  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    command: >
      bash -c "
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      "
    ports:
      - "7077:7077"
      - "8083:8080"
    volumes:
      - ./spark:/opt/spark-apps
    networks:
      - confluent

  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark-worker
    command: >
      bash -c "
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
      "
    depends_on:
      - spark-master
    networks:
      - confluent

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
      - "7199:7199"
    environment:
      - LOCAL_JMX=no
      - JMX_PORT=7199
    volumes:
      - cassandra_data:/var/lib/cassandra
      # ✅ Override the env script that controls JMX
      - ./cassandra/cassandra-env.sh:/etc/cassandra/cassandra-env.sh
      # ✅ Provide required password files
      - ./cassandra/jmxremote.password:/etc/cassandra/jmxremote.password
      - ./cassandra/jmxremote.access:/etc/cassandra/jmxremote.access
    # ✅ Fix file permissions on startup
    command: >
      bash -c "
      chmod 400 /etc/cassandra/jmxremote.password &&
      chmod 400 /etc/cassandra/jmxremote.access &&
      chmod 755 /etc/cassandra/cassandra-env.sh &&
      docker-entrypoint.sh cassandra -f
      "
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 90s
    networks:
      - confluent

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - confluent

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - confluent

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    ports:
      - "9308:9308"
    command:
      - "--kafka.server=broker:29092"
      - "--web.listen-address=:9308"
    depends_on:
      broker:
        condition: service_healthy
    restart: on-failure
    networks:
      - confluent

  # cassandra-exporter:
  #   image: sscaling/jmx-prometheus-exporter:latest
  #   container_name: cassandra-exporter
  #   ports:
  #     - "8086:5556"
  #   environment:
  #     - CONFIG_YML=/opt/jmx_exporter/config.yml
  #   volumes:
  #     - ./monitoring/jmx-cassandra.yml:/opt/jmx_exporter/config.yml
  #   depends_on:
  #     cassandra:
  #       condition: service_healthy
  #   restart: on-failure
  #   networks:
  #     - confluent

# ======================================
networks:
  confluent:
volumes:
  cassandra_data:
    driver: local
